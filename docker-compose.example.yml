services:
  bookthing:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - /path/to/your/audiobooks:/audiobooks:ro
      - ./data:/data
    environment:
      - BASE_URL=https://your-domain.example.com
      - SESSION_DAYS=30
      - ADMIN_EMAIL=you@example.com
      - GMAIL_SENDER=you@example.com
      - GMAIL_APP_PASSWORD=your-gmail-app-password
      - CLIENT_LOG_LEVEL=warning  # set to "info" or "debug" for more verbose browser logs
      # - CLIENT_LOG_PATH=/data/client.log  # default: same directory as metadata.json
      # - VERSION_POLL_SECS=300  # how often clients check for a new deploy (default: 300)
    restart: unless-stopped
